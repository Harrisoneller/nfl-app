# Railway service config.
# https://docs.railway.com/reference/config-as-code
#
# Railway auto-detects the pyproject.toml and runs `pip install`. We override
# the start command to run Alembic migrations first, then launch uvicorn on
# the platform-assigned $PORT.

[build]
builder = "NIXPACKS"
buildCommand = "pip install -e ."

[deploy]
startCommand = "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
healthcheckPath = "/live"
healthcheckTimeout = 30
